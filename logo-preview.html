<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Istok.AI — выбор логотипа</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f19;
      --card: #151d2f;
      --border: rgba(148, 163, 184, 0.14);
      --text: #e8edf7;
      --muted: #94a3b8;
      --accent: #3b82f6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 32px 20px 64px;
    }
    .wrap { max-width: 960px; margin: 0 auto; }
    h1 { font-size: 1.6rem; margin: 0 0 8px; }
    .lead { color: var(--muted); margin: 0 0 32px; max-width: 640px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }
    .card h2 { font-size: 1rem; margin: 0 0 4px; }
    .card p {
      font-size: 0.88rem;
      color: var(--muted);
      margin: 0 0 16px;
      min-height: 2.6em;
    }
    .sizes {
      display: flex;
      align-items: flex-end;
      gap: 20px;
      margin-bottom: 16px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 12px;
    }
    .size-item { text-align: center; }
    .size-item span {
      display: block;
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 6px;
    }
    .logo-slot svg { display: block; }
    .with-name {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-weight: 700;
      font-size: 1.05rem;
    }
    .logo-ai {
      font-size: 0.82rem;
      color: #93c5fd;
      padding: 2px 7px 2px 2px;
      border-radius: 6px;
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.25);
    }
    .current {
      border-color: rgba(59, 130, 246, 0.45);
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.2);
    }
    .badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      color: #93c5fd;
      background: rgba(59, 130, 246, 0.15);
      padding: 3px 8px;
      border-radius: 999px;
      margin-bottom: 8px;
    }
    a.back {
      display: inline-block;
      margin-bottom: 24px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
    }
    a.back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="index.html">← Вернуться на сайт</a>
    <h1>Варианты логотипа Istok.AI</h1>
    <p class="lead">40 вариантов + текущий знак: вода, реки, ИИ, мозг, нейросети. Напишите номер — подставим на сайт.</p>
    <div class="grid" id="logo-grid"></div>
  </div>

  <script src="js/logo-preview-data.js"></script>
  <script>
    const SIZES = [32, 40, 64];

    function namespaceSvgIds(svg, prefix) {
      let out = svg.replace(/\bid="([^"]+)"/g, `id="${prefix}$1"`);
      out = out.replace(/url\(#([^)]+)\)/g, `url(#${prefix}$1)`);
      return out;
    }

    function svgAtSize(svg, size, idPrefix) {
      const doc = new DOMParser().parseFromString(namespaceSvgIds(svg, idPrefix), "image/svg+xml");
      const node = doc.documentElement;
      if (node.querySelector("parsererror")) return null;
      node.setAttribute("width", String(size));
      node.setAttribute("height", String(size));
      return node;
    }

    function fillSlot(slot, svg, size, idPrefix) {
      slot.innerHTML = "";
      const node = svgAtSize(svg, size, idPrefix);
      if (!node) {
        slot.textContent = "?";
        return;
      }
      slot.appendChild(document.importNode(node, true));
    }

    const grid = document.getElementById("logo-grid");

    LOGO_VARIANTS.forEach((variant, variantIndex) => {
      const card = document.createElement("article");
      card.className = "card" + (variant.current ? " current" : "");

      const badge = variant.current ? '<span class="badge">Сейчас на сайте</span>' : "";
      const sizesHtml = SIZES.map(
        (size) =>
          `<div class="size-item"><div class="logo-slot" data-size="${size}"></div><span>${size} px</span></div>`
      ).join("");

      card.innerHTML = `
        ${badge}
        <h2>${variant.title}</h2>
        <p>${variant.desc}</p>
        <div class="sizes">${sizesHtml}</div>
        <div class="with-name">
          <div class="logo-slot" data-size="40"></div>
          Istok.<span class="logo-ai">AI</span>
        </div>
      `;

      let slotIndex = 0;
      card.querySelectorAll(".logo-slot").forEach((slot) => {
        const prefix = `l${variantIndex}-${slotIndex++}-`;
        fillSlot(slot, variant.svg, Number(slot.dataset.size), prefix);
      });

      grid.appendChild(card);
    });
  </script>
</body>
</html>
